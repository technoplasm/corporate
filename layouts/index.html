{{ define "head" }}
<style>
    .gif-text {
        background-image: none; /* JSで動的に書き換え */
        background-size: cover;
        background-position: center;
        background-attachment: scroll;
        -webkit-background-clip: text;
        -moz-background-clip: text;
        background-clip: text;
        color: transparent;
        -webkit-text-fill-color: transparent;
        text-decoration: none;
    }
</style>
{{ end }}

{{ define "main" }}
<div class="flex-grow flex flex-col relative z-10">
    <div class="flex-grow flex flex-col justify-center items-center text-center px-6 relative">
        <div class="relative z-10">
            <h1 class="font-public-sans font-bold text-6xl sm:text-8xl md:text-[120px] mb-4 tracking-tight leading-tight gif-text">
                Technoplasm
            </h1>
            <p class="text-xl sm:text-2xl md:text-3xl font-medium leading-loose">
                <span class="text-white">その身体は</span><span class="gif-text text-2xl sm:text-3xl md:text-4xl">テクノロジー</span><span class="text-white">で出来ている</span>
            </p>
        </div>
        <script data-swup-reload-script>
            (function() {
                var gifs = [
                    // 'url(https://media4.giphy.com/media/RinDK3M9VVPclvxfKo/giphy.gif)',
                    // 'url(https://media2.giphy.com/media/l0IyhNlpfmQtjkuDC/giphy.gif)',
                    // 'url(https://media4.giphy.com/media/OASauXvaI5dadxxVDC/giphy.gif)',
                    // 'url(https://media1.giphy.com/media/5w6wPYD9xGiqDRcfnm/giphy.gif)',
                    // 'url(https://media1.giphy.com/media/3ohs4nsg2WyigiHYbu/giphy.gif)',
                    // 'url(https://media4.giphy.com/media/l0MYzChNIAiu7fT1K/giphy.gif)', // 青しましま
                    // 'url(https://media3.giphy.com/media/xUOxeQkDWcfWGiTevu/giphy.gif)', // 紫系宇宙
                    // 'url(https://media4.giphy.com/media/epRJD2s3WklPvxe5kM/giphy.gif)', // ゴールドラッシュ
                    // 'url(https://media0.giphy.com/media/9JxkPTP3alOykb8PmQ/giphy.gif)', // 淡い青い波
                    // 'url(https://media4.giphy.com/media/MWtymoZATqT268RIag/giphy.gif)', // 白ピンク紫
                    // 'url(https://media0.giphy.com/media/3bc8pP1rVdfgN1uoMV/giphy.gif)', // 青い煙
                    'url(https://media3.giphy.com/media/l3mZ7fv3fSzTe6id2/giphy.gif)', // 海っぽいきらめき
                    'url(https://media1.giphy.com/media/h6IEWL7c19SS6Yn1FM/giphy.gif)', // 緑水玉
                    'url(https://media1.giphy.com/media/HlszHDwXM6r0mGlByr/giphy.gif)', // サイケデリック
                    'url(https://media1.giphy.com/media/3ohs4nsg2WyigiHYbu/giphy.gif)', // 青紫ゆっくりスモーク
                ];
                gifs.forEach(function(g) {
                    var img = new Image();
                    img.src = g.replace(/^url\(["']?|["']?\)$/g, '');
                });
                var positions = ['center 20%', 'center 50%', 'center 80%'];
                var idx = Math.floor(Math.random() * gifs.length);
                var els = document.querySelectorAll('.gif-text');
                var timer = setInterval(next, 10000);
                function applyGif() {
                    var pos = positions[Math.floor(Math.random() * positions.length)];
                    for (var i = 0; i < els.length; i++) {
                        els[i].style.backgroundImage = gifs[idx];
                        els[i].style.backgroundPosition = pos;
                    }
                }
                function next() {
                    idx = (idx + 1) % gifs.length;
                    applyGif();
                }
                function clickNext() {
                    clearInterval(timer);
                    next();
                    timer = setInterval(next, 10000);
                }
                applyGif();
                for (var i = 0; i < els.length; i++) {
                    els[i].style.cursor = 'pointer';
                    els[i].addEventListener('click', clickNext);
                }
                window.__pageCleanup = function() {
                    clearInterval(timer);
                    for (var i = 0; i < els.length; i++) {
                        els[i].removeEventListener('click', clickNext);
                    }
                };
            })();
        </script>
    </div>

    <!-- News Section -->
    <section class="py-6 px-6">
        <div class="max-w-4xl mx-auto">
            <div class="rounded border border-white/20 overflow-hidden bg-white/10">
                <div class="max-h-[11rem] overflow-y-auto divide-y divide-white/10">
                    {{ range first 5 (where .Site.RegularPages "Section" "news") }}
                    <div class="flex items-center px-4 py-3">
                        <time class="text-base shrink-0 w-36 text-neutral-400">{{ .Date.Format "2006年1月2日" }}</time>
                        <p class="text-base text-neutral-100">{{ .Title }}
                            {{ with .Params.blog }}　<a href="{{ . }}" class="text-sm text-blue-400 hover:text-blue-300">ブログ記事</a>{{ end }}
                        </p>
                    </div>
                    {{ end }}
                </div>
            </div>
        </div>
    </section>
</div>
{{ end }}
